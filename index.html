<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Chant</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

.container{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

#chant{
font-size:7vw;
font-weight:bold;
line-height:1.4;
max-width:900px;
animation:scrollUp 4s linear;
}

#repeat{
margin-top:20px;
font-size:4vw;
opacity:0.8;
}

.progress{
position:fixed;
bottom:0;
left:0;
height:6px;
background:#ff4444;
width:0%;
transition:width 4s linear;
}

@keyframes scrollUp{
0%{
transform:translateY(50px);
opacity:0;
}
100%{
transform:translateY(0);
opacity:1;
}
}

</style>
</head>

<body>

<div class="container">
    <div id="chant"></div>
    <div id="repeat"></div>
</div>

<div class="progress" id="progress"></div>

<script>

// ------------------------------
// SOCKET.IO
// ------------------------------
const socket = io();

const chantEl = document.getElementById("chant");
const repeatEl = document.getElementById("repeat");
const progress = document.getElementById("progress");

socket.on("chantUpdate",(data)=>{

    chantEl.style.animation="none";
    void chantEl.offsetWidth;
    chantEl.style.animation="scrollUp 4s linear";

    chantEl.innerText = data.chant;

    repeatEl.innerText = "Repeat " + data.repeat + " / 10";

    progress.style.width="0%";

    setTimeout(()=>{
        progress.style.width="100%";
    },50);

});


// ------------------------------
// SCREEN WAKE LOCK (keeps phone awake)
// ------------------------------
let wakeLock = null;

async function keepScreenOn() {
    try {
        wakeLock = await navigator.wakeLock.request("screen");
        console.log("Screen Wake Lock activated");

        wakeLock.addEventListener("release", () => {
            console.log("Wake Lock released — trying to re-acquire");
        });
    } catch (err) {
        console.error("Wake Lock error:", err);
    }
}

// Wake lock must be triggered after a user gesture
document.addEventListener("click", () => {
    keepScreenOn();
}, { once: true });

</script>

</body>
</html>
